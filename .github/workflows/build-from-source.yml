name: Build APK from source (zero trust)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code with all submodules
      uses: actions/checkout@v6
      with:
        submodules: 'recursive'
        fetch-depth: '0'

    - name: Setup Java 21
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: '21'

    - name: Setup Go
      uses: actions/setup-go@v6
      with:
        go-version-file: 'AndroidLibXrayLite/go.mod'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3.2.0
      with:
        log-accepted-android-sdk-licenses: false
        cmdline-tools-version: '13114758'
        packages: 'platforms;android-36.1 build-tools;36.1.0 platform-tools'

    - name: Install NDK
      run: |
        echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
          --channel=0 \
          --install "ndk;28.2.13676358"
        echo "NDK_HOME=$ANDROID_HOME/ndk/28.2.13676358" >> $GITHUB_ENV
        sed -i '10i\
        \
            ndkVersion = "28.2.13676358"' ${{ github.workspace }}/V2rayNG/app/build.gradle.kts

    - name: "Build hev-socks5-tunnel from source (C code)"
      run: bash compile-hevtun.sh

    - name: Copy hev-socks5-tunnel libs
      run: cp -r ${{ github.workspace }}/libs ${{ github.workspace }}/V2rayNG/app

    - name: Install gomobile
      run: |
        go install golang.org/x/mobile/cmd/gomobile@latest
        echo "$HOME/go/bin" >> $GITHUB_PATH

    - name: "Build libv2ray.aar from source (Go code + xray-core)"
      run: |
        cd ${{ github.workspace }}/AndroidLibXrayLite
        mkdir -p assets data
        bash gen_assets.sh download
        cp data/*.dat assets/
        gomobile init
        go mod tidy
        gomobile bind -v -androidapi 24 -trimpath -ldflags='-s -w -buildid=' ./
        cp libv2ray.aar ${{ github.workspace }}/V2rayNG/app/libs/

    - name: "Build v2rayNG APK from source (Kotlin code)"
      run: |
        cd ${{ github.workspace }}/V2rayNG
        echo "sdk.dir=${ANDROID_HOME}" > local.properties
        chmod 755 gradlew
        ./gradlew licenseFdroidReleaseReport
        ./gradlew assembleFdroidDebug

    - name: Upload APK (arm64-v8a)
      uses: actions/upload-artifact@v7
      if: success()
      with:
        name: v2rayNG-arm64-v8a-from-source
        path: ${{ github.workspace }}/V2rayNG/app/build/outputs/apk/fdroid/debug/*arm64-v8a*.apk

    - name: Upload APK (armeabi-v7a)
      uses: actions/upload-artifact@v7
      if: success()
      with:
        name: v2rayNG-armeabi-v7a-from-source
        path: ${{ github.workspace }}/V2rayNG/app/build/outputs/apk/fdroid/debug/*armeabi-v7a*.apk

    - name: Upload APK (x86_64)
      uses: actions/upload-artifact@v7
      if: success()
      with:
        name: v2rayNG-x86_64-from-source
        path: ${{ github.workspace }}/V2rayNG/app/build/outputs/apk/fdroid/debug/*x86_64*.apk

    - name: Upload APK (x86)
      uses: actions/upload-artifact@v7
      if: success()
      with:
        name: v2rayNG-x86-from-source
        path: ${{ github.workspace }}/V2rayNG/app/build/outputs/apk/fdroid/debug/*x86*.apk
